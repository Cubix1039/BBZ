<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Order from BG BAZAAR.">
    <meta name="theme-color" content="#087f8c">
    <title>BG BAZAAR | Order Now</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f4faf9;
        color: #123436;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }

      main {
        width: min(100%, 520px);
      }

      h1 {
        margin: 0 0 28px;
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0;
      }

      .order-button {
        display: inline-flex;
        min-height: 56px;
        align-items: center;
        justify-content: center;
        padding: 16px 30px;
        border-radius: 6px;
        background: #087f8c;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(8, 127, 140, 0.22);
        transition: background 160ms ease, transform 160ms ease;
      }

      .order-button:hover {
        background: #066b75;
        transform: translateY(-2px);
      }

      .order-button:focus-visible {
        outline: 3px solid #f0b429;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BG BAZAAR</h1>
      <a class="order-button" href="https://forms.gle/Xgtz8PZZAVnTHpx56">Press to Order</a>
    </main>
  </body>
</html>
